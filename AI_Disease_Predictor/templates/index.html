<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Disease Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: Arial, sans-serif;
        }

        .card{
            width:750px;
            border:none;
            border-radius:20px;
            padding:25px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#0d6efd;
            font-weight:bold;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:20px;
        }

        .btn-custom{
            background:#0d6efd;
            color:white;
            font-size:18px;
            padding:10px;
        }

        .btn-custom:hover{
            background:#084298;
            color:white;
        }
    </style>
</head>

<body>

<div class="card bg-white">

    <h1>🏥 AI Disease Predictor</h1>

    <p class="subtitle">
        Predict diseases based on symptoms using Machine Learning
    </p>

    <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef"
         class="img-fluid rounded mb-4"
         alt="Medical Banner">

    <form action="/predict" method="POST">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Fever</label>
                <select name="fever" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Cough</label>
                <select name="cough" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Headache</label>
                <select name="headache" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Fatigue</label>
                <select name="fatigue" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Body Pain</label>
                <select name="bodypain" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Vomiting</label>
                <select name="vomiting" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Nausea</label>
                <select name="nausea" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Runny Nose</label>
                <select name="runnynose" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Sore Throat</label>
                <select name="sorethroat" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Dizziness</label>
                <select name="dizziness" class="form-select">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

        </div>

        <button type="submit" class="btn btn-custom w-100 mt-3">
            🔍 Predict Disease
        </button>

    </form>

</div>

</body>
</html>
